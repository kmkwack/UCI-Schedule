name: Seed course sections

# Runs daily at 03:00 UTC for every supported school.
# All schools are seeded through the same backfill runner — no school is special.
#
# Supported schools: uci, umd, cornell, purdue, uiuc
#
# Required GitHub secrets:
#   SUPABASE_URL              – Supabase project URL
#   SUPABASE_SERVICE_KEY      – service_role key (write access)
#   ANTEATER_API_KEY          – needed only for UCI
#
# If secrets are not configured the run exits cleanly (no failure email).

on:
  schedule:
    - cron: "0 3 * * *"    # every day at 03:00 UTC
  workflow_dispatch:
    inputs:
      schools:
        description: "Schools to seed: uci,umd,cornell,purdue,uiuc  (or 'all')"
        required: false
        default: "all"
      from_year:
        description: "First year  (default: current year)"
        required: false
        default: ""
      to_year:
        description: "Last year   (default: current year + 1)"
        required: false
        default: ""
      terms:
        description: "Terms to seed, e.g. Spring,Fall  (default: all terms for each school)"
        required: false
        default: ""

env:
  SUPABASE_URL:              ${{ secrets.SUPABASE_URL }}
  SUPABASE_SERVICE_KEY:      ${{ secrets.SUPABASE_SERVICE_KEY || secrets.SUPABASE_SERVICE_ROLE_KEY }}
  SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
  ANTEATER_API_KEY:          ${{ secrets.ANTEATER_API_KEY }}

jobs:
  seed:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      # ── 0. Guard: skip cleanly when secrets are absent ───────────────────────
      - name: Check secrets
        id: check
        shell: bash
        run: |
          if [[ -z "${SUPABASE_URL:-}" || ( -z "${SUPABASE_SERVICE_KEY:-}" && -z "${SUPABASE_SERVICE_ROLE_KEY:-}" ) ]]; then
            echo "Supabase secrets not configured — skipping run."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      # ── 1. Setup ─────────────────────────────────────────────────────────────
      - name: Checkout
        if: steps.check.outputs.skip != 'true'
        uses: actions/checkout@v4

      - name: Set up Node 24
        if: steps.check.outputs.skip != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        if: steps.check.outputs.skip != 'true'
        run: npm ci

      # ── 2. Seed all schools — current year ───────────────────────────────────
      - name: Seed all schools — current year
        if: steps.check.outputs.skip != 'true'
        continue-on-error: true
        shell: bash
        run: |
          YEAR="$(date +%Y)"

          # For manual dispatch, honour the inputs; for schedule use current year
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            FROM="${{ github.event.inputs.from_year }}"
            TO="${{ github.event.inputs.to_year }}"
            FROM="${FROM:-$YEAR}"
            TO="${TO:-$((YEAR + 1))}"
            ARGS=(--from-year "$FROM" --to-year "$TO")

            SCHOOLS="${{ github.event.inputs.schools }}"
            SCHOOLS="${SCHOOLS:-all}"
            [[ "$SCHOOLS" != "all" ]] && ARGS+=(--schools "$SCHOOLS")

            TERMS="${{ github.event.inputs.terms }}"
            [[ -n "$TERMS" ]] && ARGS+=(--terms "$TERMS")
          else
            ARGS=(--from-year "$YEAR" --to-year "$YEAR")
          fi

          node scripts/backfill-school-sections.js "${ARGS[@]}"

      # ── 3. Seed all schools — next year (when data is available) ─────────────
      - name: Seed all schools — next year
        if: steps.check.outputs.skip != 'true' && github.event_name == 'schedule'
        continue-on-error: true
        shell: bash
        run: |
          NEXT="$(( $(date +%Y) + 1 ))"
          node scripts/backfill-school-sections.js --from-year "$NEXT" --to-year "$NEXT"

      # ── 4. Reconcile school_terms index ──────────────────────────────────────
      - name: Reconcile school_terms index
        if: steps.check.outputs.skip != 'true'
        continue-on-error: true
        shell: bash
        run: |
          YEAR="$(date +%Y)"
          node scripts/reconcile-school-terms.js \
            --from-year "$((YEAR - 1))" \
            --to-year   "$((YEAR + 1))"
