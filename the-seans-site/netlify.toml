# Netlify 설정 — 정적 사이트 (빌드 단계 없음).
# Netlify 대시보드에서 Base directory를 "the-seans-site" 로 지정하면
# 아래 publish="." 가 the-seans-site 폴더를 그대로 배포한다.
[build]
  publish = "."
  command = ""

# 확장자 없는 깔끔한 경로 지원: /privacy, /terms
[[redirects]]
  from = "/privacy"
  to = "/privacy.html"
  status = 200

[[redirects]]
  from = "/terms"
  to = "/terms.html"
  status = 200
