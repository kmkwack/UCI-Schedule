name: Seed academic calendar

# Runs monthly to auto-fetch academic calendar dates from each school's
# official registrar page and upsert them into Supabase.
#
# Required GitHub secrets:
#   SUPABASE_URL          – Supabase project URL
#   SUPABASE_SERVICE_KEY  – service_role key (write access)

on:
  schedule:
    - cron: "0 4 * * *"    # every day at 04:00 UTC
  workflow_dispatch:
    inputs:
      schools:
        description: "Schools: uci,cornell,purdue,umd,uiuc (or 'all')"
        required: false
        default: "uci,cornell,purdue,umd,uiuc"
      years:
        description: "Academic year starts (e.g. 2025,2026)"
        required: false
        default: ""

env:
  SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
  SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY || secrets.SUPABASE_SERVICE_ROLE_KEY }}

jobs:
  seed:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check secrets
        id: check
        shell: bash
        run: |
          if [[ -z "${SUPABASE_URL:-}" || -z "${SUPABASE_SERVICE_KEY:-}" ]]; then
            echo "Supabase secrets not configured — skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        if: steps.check.outputs.skip != 'true'
        uses: actions/checkout@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Set up Node 24
        if: steps.check.outputs.skip != 'true'
        uses: actions/setup-node@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        if: steps.check.outputs.skip != 'true'
        run: npm ci --ignore-scripts

      - name: Seed academic calendar — all schools
        if: steps.check.outputs.skip != 'true'
        shell: bash
        run: |
          YEAR="$(date +%Y)"

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            SCHOOLS="${{ github.event.inputs.schools }}"
            SCHOOLS="${SCHOOLS:-uci,cornell,purdue,umd,uiuc}"
            YEARS="${{ github.event.inputs.years }}"
            YEARS="${YEARS:-$YEAR,$((YEAR + 1))}"
          else
            # Scheduled: seed all schools, current + next academic year
            SCHOOLS="uci,cornell,purdue,umd,uiuc"
            YEARS="$YEAR,$((YEAR + 1))"
          fi

          echo "Schools: $SCHOOLS"
          echo "Years: $YEARS"
          node scripts/seed-academic-calendar.js --schools "$SCHOOLS" --years "$YEARS" || true
